<div id="hint">sweep the confetti ✦</div>
<script>
const colors = [
  "#C8102E","#E8321A","#F26522","#F7A600",
  "#6AB023","#2E7D32","#006747","#007B73","#009CDE",
  "#0057A8","#002D72","#3A1D96","#6B2D8B","#A6005C",
  "#D1006E","#E8488A","#8B2500","#1A1A1A",
  "#2C2C2C","#5C5C5C","#999999","#D4D4D4",
  "#F5F0E8","#D4B483","#8B6914","#00857C","#007DC5",
  "#E63946","#F4A261","#2A9D8F","#264653",
  "#48CAE4","#023E8A","#B5179E","#FF6D00",
  "#6D4C41","#37474F","#FF8F00","#00695C",
  "#AD1457","#1565C0","#4A148C","#006064","#558B2F",
  "#FFFFFF","#FFFFFF","#FFFFFF","#FFFFFF","#F8F8F8","#F0EDE8",
  "#F9D100","#F9D100","#F9D100","#F7A600","#E8B800","#D4A000",
  "#C9B8E8","#BBA9E0","#D4C5F0","#C5B3E6","#B8A0E0","#DDD0F5",
];

const allColors = [...colors, ...colors];
const DOT_SIZE = 48;

// Fingertip is the pointing finger tip — top-centre of the image
// Image is ~52x60px rendered; finger tip approx at (26, 2)
const TIP_X = 26;
const TIP_Y = 2;

// Push radius = just the dot of the fingertip — very tight
const PUSH_RADIUS = 30;
const SWEEP_STRENGTH = 20;
const FRICTION = 0.88;

function r(a, b) { return Math.random() * (b - a) + a; }

const dots = [];
allColors.forEach((color, i) => {
  const el = document.createElement("div");
  el.className = "dot";
  el.style.background = color;
  el.style.zIndex = i + 10;
  const x = r(2, window.innerWidth  - DOT_SIZE - 2);
  const y = r(2, window.innerHeight - DOT_SIZE - 2);
  el.style.left = x + "px";
  el.style.top  = y + "px";
  document.body.appendChild(el);
  dots.push({ el, x, y, vx: 0, vy: 0 });
});

let mx = -9999, my = -9999;
let cvx = 0, cvy = 0;
const hand = document.getElementById("hand");

document.addEventListener("mousemove", e => {
  cvx = e.clientX - mx;
  cvy = e.clientY - my;
  mx = e.clientX;
  my = e.clientY;
  hand.style.left = (mx - TIP_X) + "px";
  hand.style.top  = (my - TIP_Y) + "px";
});

document.addEventListener("touchmove", e => {
  e.preventDefault();
  cvx = e.touches[0].clientX - mx;
  cvy = e.touches[0].clientY - my;
  mx = e.touches[0].clientX;
  my = e.touches[0].clientY;
  hand.style.left = (mx - TIP_X) + "px";
  hand.style.top  = (my - TIP_Y) + "px";
}, { passive: false });

document.addEventListener("touchend", () => { mx = -9999; my = -9999; cvx = 0; cvy = 0; });

function tick() {
  const cursorSpeed = Math.sqrt(cvx * cvx + cvy * cvy);

  dots.forEach(d => {
    const cx = d.x + DOT_SIZE / 2;
    const cy = d.y + DOT_SIZE / 2;
    const dx = cx - mx;
    const dy = cy - my;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < PUSH_RADIUS && dist > 0 && cursorSpeed > 0.3) {
      const proximity = (PUSH_RADIUS - dist) / PUSH_RADIUS;
      const push = proximity * Math.min(cursorSpeed, 40) * (SWEEP_STRENGTH / 40);
      const awayX = dx / dist;
      const awayY = dy / dist;
      const sweepX = cvx / (cursorSpeed + 0.001);
      const sweepY = cvy / (cursorSpeed + 0.001);
      d.vx += (awayX * 0.3 + sweepX * 0.7) * push;
      d.vy += (awayY * 0.3 + sweepY * 0.7) * push;
    }

    d.vx *= FRICTION;
    d.vy *= FRICTION;
    d.x += d.vx;
    d.y += d.vy;

    if (d.x < 0) { d.x = 0; d.vx *= -0.4; }
    if (d.y < 0) { d.y = 0; d.vy *= -0.4; }
    if (d.x > window.innerWidth  - DOT_SIZE) { d.x = window.innerWidth  - DOT_SIZE; d.vx *= -0.4; }
    if (d.y > window.innerHeight - DOT_SIZE) { d.y = window.innerHeight - DOT_SIZE; d.vy *= -0.4; }

    d.el.style.left = d.x + "px";
    d.el.style.top  = d.y + "px";
  });

  cvx *= 0.75;
  cvy *= 0.75;
  requestAnimationFrame(tick);
}

tick();
setTimeout(() => { document.getElementById("hint").style.opacity = "0"; }, 3500);
</script>
